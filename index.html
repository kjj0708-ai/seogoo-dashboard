<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서구 도시주택국 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{--primary:#1a3a5c;--pl:#2563a8;--accent:#e8a020;--bg:#f0f4f8;--sur:#fff;--bdr:#d1dbe8;--tx:#1e2d3d;--tx2:#4a6080;--tx3:#8a9baf;--red:#dc2626;--sh:0 2px 8px rgba(26,58,92,.10);--shl:0 8px 24px rgba(26,58,92,.15);--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a3a5c,#2563a8);}
.lbox{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:var(--shl);}
.llogo{text-align:center;margin-bottom:32px;}.llogo .ico{font-size:48px;}.llogo h1{font-size:22px;font-weight:700;color:var(--primary);margin-top:10px;}.llogo p{font-size:13px;color:var(--tx2);margin-top:4px;}
.ltabs{display:flex;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:24px;}
.ltab{flex:1;padding:10px;border:none;background:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--tx2);font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.ltab.active{background:#fff;color:var(--primary);box-shadow:var(--sh);}
.fg{margin-bottom:16px;}.fg label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:6px;}
.fg input,.fg select{width:100%;padding:12px 16px;border:1.5px solid var(--bdr);border-radius:8px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;background:#fff;}
.fg input:focus,.fg select:focus{border-color:var(--pl);}
.btnLogin{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s;margin-top:8px;}
.btnLogin:hover{background:var(--pl);}.lerr{color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none;}
#app{display:none;flex-direction:column;min-height:100vh;}
header{background:var(--primary);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hL{display:flex;align-items:center;gap:12px;}.hL h1{font-size:17px;font-weight:700;}
.sync{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.15);display:flex;align-items:center;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ade80;}.sdot.off{background:#f87171;}
.hR{display:flex;align-items:center;gap:12px;}.ubadge{font-size:13px;opacity:.85;}
.btnOut{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
.tabsBar{background:#fff;border-bottom:2px solid var(--bdr);display:flex;padding:0 24px;}
.tBtn{padding:16px 20px;border:none;background:none;cursor:pointer;font-size:15px;font-weight:500;color:var(--tx2);font-family:'Noto Sans KR',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tBtn.active{color:var(--primary);border-bottom-color:var(--pl);}.tPanel{display:none;}.tPanel.active{display:block;}
main{flex:1;padding:24px;max-width:1400px;width:100%;margin:0 auto;}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btnP{background:var(--pl);color:#fff;}.btnP:hover{background:var(--primary);}
.btnD{background:#fee2e2;color:var(--red);}.btnD:hover{background:var(--red);color:#fff;}
.btnG{background:var(--bg);color:var(--tx2);border:1px solid var(--bdr);}.btnG:hover{background:var(--bdr);}
.btn.sm{padding:5px 10px;font-size:12px;}
.secH{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.secT{font-size:16px;font-weight:700;color:var(--primary);}
.statRow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.statCard{background:#fff;border-radius:var(--r);padding:16px 20px;box-shadow:var(--sh);border-top:4px solid var(--bdr);}
.statCard.all{border-top-color:#6366f1;}.statCard.recv{border-top-color:#f59e0b;}.statCard.proc{border-top-color:#3b82f6;}.statCard.done{border-top-color:#22c55e;}
.statNum{font-size:28px;font-weight:700;}.statLabel{font-size:12px;color:var(--tx2);}
.filterBar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.issueList{display:flex;flex-direction:column;gap:12px;}
.issItem{background:#fff;border-radius:var(--r);padding:16px 20px;box-shadow:var(--sh);border-left:4px solid var(--bdr);transition:box-shadow .2s;}
.issItem.recv{border-left-color:#f59e0b;}.issItem.proc{border-left-color:#3b82f6;}.issItem.done{border-left-color:#22c55e;opacity:.85;}
.issTop{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.issTitle{font-size:15px;font-weight:600;}.issMeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px;}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.bRecv{background:#fef3c7;color:#92400e;}.bProc{background:#dbeafe;color:#1d4ed8;}.bDone{background:#dcfce7;color:#166534;}.bDept{background:#ede9fe;color:#6d28d9;}
.issContent{font-size:14px;color:var(--tx2);line-height:1.6;margin-bottom:8px;}
.issPhoto{max-width:200px;max-height:150px;border-radius:6px;margin-top:8px;cursor:pointer;}
.issActions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.statusBtns{display:flex;gap:4px;margin-top:8px;}
.sBtn{padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;border:1px solid transparent;transition:all .15s;}
.sBtnR{background:#fef3c7;color:#92400e;border-color:#f59e0b;}.sBtnR:hover,.sBtnR.cur{background:#f59e0b;color:#fff;}
.sBtnP{background:#dbeafe;color:#1d4ed8;border-color:#3b82f6;}.sBtnP:hover,.sBtnP.cur{background:#3b82f6;color:#fff;}
.sBtnD{background:#dcfce7;color:#166534;border-color:#22c55e;}.sBtnD:hover,.sBtnD.cur{background:#22c55e;color:#fff;}
.adminPnl{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:20px;border:2px solid var(--accent);}
.adminLbl{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:12px;}
.instrBox{background:linear-gradient(135deg,#1a3a5c,#2563a8);color:#fff;border-radius:var(--r);padding:20px 24px;margin-bottom:20px;display:flex;align-items:flex-start;gap:16px;}
.instrBox .ico{font-size:28px;flex-shrink:0;}.instrBox h3{font-size:13px;opacity:.75;margin-bottom:6px;}.instrBox p{font-size:15px;font-weight:500;line-height:1.6;}.instrDate{font-size:12px;opacity:.65;margin-top:6px;}
.wkDisp{font-size:16px;font-weight:700;color:var(--primary);}
.dGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.dCard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.dCardH{padding:14px 18px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.dCardH h3{font-size:15px;font-weight:700;}.togIco{font-size:13px;transition:transform .3s;}.togIco.open{transform:rotate(180deg);}
.teamList{display:block;}.teamItem{border-top:1px solid var(--bdr);}
.teamH{padding:10px 18px;display:flex;align-items:center;justify-content:space-between;background:#f8fafc;cursor:pointer;user-select:none;}
.teamNm{font-size:13px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:6px;}
.tCnt{font-size:11px;background:var(--pl);color:#fff;padding:1px 7px;border-radius:10px;}
.teamReps{display:block;}
.repEntry{padding:12px 18px;border-bottom:1px solid var(--bg);}.repEntry:last-child{border-bottom:none;}
.repTop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.repTitle{font-size:13px;font-weight:700;color:var(--primary);}
.repSec{margin-top:8px;}.repSecLbl{font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:3px;}
.repSecCt{font-size:13px;color:var(--tx2);line-height:1.5;padding:8px 10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--pl);white-space:pre-wrap;word-break:break-word;}
.repSecCt.next{border-left-color:var(--accent);}
.repMeta{font-size:11px;color:var(--tx3);margin-top:6px;}.noRep{padding:12px 18px;font-size:13px;color:var(--tx3);text-align:center;}
.calLayout{display:grid;grid-template-columns:1fr 300px;gap:20px;}
.calWrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.calNav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bdr);}
.calTitle{font-size:17px;font-weight:700;}.calNBtn{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:16px;}
.calGrid{display:grid;grid-template-columns:repeat(7,1fr);}
.calGrid.weekdays-only{grid-template-columns:repeat(5,1fr);}
.calDL{padding:8px;text-align:center;font-size:12px;font-weight:600;color:var(--tx2);background:var(--bg);}
.calCell{min-height:88px;padding:5px;border-top:1px solid var(--bdr);border-right:1px solid var(--bdr);cursor:pointer;transition:background .15s;}
.calCell:hover{background:#f0f4f8;}.calCell:nth-child(7n){border-right:none;}
.calGrid.weekdays-only .calCell:nth-child(7n){border-right:1px solid var(--bdr);}
.calGrid.weekdays-only .calCell:nth-child(5n){border-right:none;}
.calCell.om .calDate{color:var(--tx3);}
.calCell.today .calDate{background:var(--pl);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.calDate{font-size:12px;font-weight:500;margin-bottom:3px;}
.calEv{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.calEv.gc{background:#dbeafe;color:#1d4ed8;}.calEv.instr{background:#fef3c7;color:#92400e;}.calEv.mt{background:#d1fae5;color:#065f46;}.calEv.is{background:#fee2e2;color:#991b1b;}
.sidePanel{display:flex;flex-direction:column;gap:16px;}
.sCard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.sCH{padding:14px 18px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.sCB{padding:16px;}.gcItem{padding:8px 0;border-bottom:1px solid var(--bg);}.gcItem:last-child{border-bottom:none;}
.gcItemT{font-size:13px;font-weight:500;}.gcItemTime{font-size:11px;color:var(--tx3);margin-top:2px;}
.gcLoad{text-align:center;font-size:13px;color:var(--tx3);padding:16px;}
.mOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);}
.mH{padding:20px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;}
.mT{font-size:17px;font-weight:700;}.mClose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx3);}
.mB{padding:24px;}.mF{padding:16px 24px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end;}
.fr{margin-bottom:16px;}.fr label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:6px;}
.fr input,.fr select,.fr textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:7px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;background:#fff;resize:vertical;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--pl);}.fr textarea{min-height:90px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.confOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;}
.confBox{background:#fff;border-radius:12px;padding:28px 32px;max-width:360px;width:90%;text-align:center;box-shadow:var(--shl);}
.confBox h3{font-size:17px;font-weight:700;margin-bottom:12px;}.confBox p{font-size:14px;color:var(--tx2);margin-bottom:24px;}.confBtns{display:flex;gap:10px;justify-content:center;}
.photoModal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:flex;align-items:center;justify-content:center;}
.photoModal img{max-width:90vw;max-height:90vh;border-radius:8px;transform-origin:center;transition:transform .1s;touch-action:none;user-select:none;}
.photoClose{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);color:#fff;font-size:22px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:401;line-height:1;}
.photoClose:hover{background:rgba(255,255,255,.35);}
.archiveBadge{display:inline-block;background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:8px;}
@media(max-width:768px){main{padding:16px;}.calLayout,.dGrid{grid-template-columns:1fr;}.statRow{grid-template-columns:repeat(2,1fr);}header{padding:0 16px;}.hL h1{font-size:14px;}.tabsBar{padding:0 8px;}.tBtn{padding:12px 10px;font-size:13px;}.calWrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}.calGrid{min-width:350px;}
  .calGrid.weekdays-only .calCell{min-height:60px;padding:3px;}
  .calGrid.weekdays-only .calDL{padding:5px 2px;font-size:11px;}
  .calGrid.weekdays-only .calDate{font-size:11px;}
  .calGrid.weekdays-only .calEv{font-size:9px;padding:1px 3px;}
}
@media(max-width:480px){.lbox{padding:32px 20px;}.calCell{min-height:55px;}
  .calGrid.weekdays-only .calCell{min-height:50px;padding:2px;}
}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo"><div class="ico">🏛️</div><h1>서구 도시주택국</h1><p>업무 현황 대시보드</p></div>
    <div id="loginLoading" style="text-align:center;padding:24px 0;color:var(--tx3);font-size:14px;">⏳ 인증 확인 중...</div>
    <button class="btnLogin" id="btnGoogleLogin" onclick="doGoogleLogin()" style="display:none;align-items:center;justify-content:center;gap:10px;background:#fff;color:#333;border:1.5px solid #ddd;font-weight:600;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 계정으로 로그인
    </button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>
<div id="profileSetupScreen" style="display:none;position:fixed;inset:0;z-index:500;background:linear-gradient(135deg,#1a3a5c,#2563a8);align-items:center;justify-content:center;padding:20px;">
  <div class="lbox" style="max-height:90vh;overflow-y:auto;">
    <div class="llogo"><div class="ico">👤</div><h1 id="psGreeting">프로필 설정</h1><p id="psEmailDisp" style="font-size:12px;margin-top:4px;opacity:.7;"></p></div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:20px;text-align:center;">소속 과·팀을 설정하고 대시보드를 시작하세요.</p>
    <div class="fg"><label>이름</label><input type="text" id="psName" placeholder="이름을 입력하세요"></div>
    <div class="fg"><label>소속 과</label>
      <select id="psDept" onchange="updatePsTeam()">
        <option value="">-- 소속 과 선택 --</option>
        <option>도로과</option><option>도시계획과</option><option>건축과</option><option>주택과</option><option>도시재생경관과</option>
      </select>
    </div>
    <div class="fg"><label>소속 팀</label><select id="psTeam"><option value="">-- 팀 선택 --</option></select></div>
    <details style="margin-bottom:16px;">
      <summary style="font-size:13px;color:var(--tx2);cursor:pointer;user-select:none;padding:4px 0;">🔑 관리자 권한 설정 (선택사항)</summary>
      <div class="fg" style="margin-top:10px;margin-bottom:0;"><label>관리자 코드</label><input type="password" id="psAdminCode" placeholder="관리자 코드 입력"></div>
    </details>
    <button class="btnLogin" onclick="saveProfileSetup()">저장 후 시작하기</button>
    <div class="lerr" id="psErr"></div>
  </div>
</div>
<div id="app">
  <header>
    <div class="hL"><h1>🏛️ 서구 도시주택국 대시보드</h1><div class="sync"><div class="sdot" id="sdot"></div><span id="stxt">연결 중...</span></div></div>
    <div class="hR"><span class="ubadge" id="ubadge"></span><button class="btnOut" onclick="doLogout()">로그아웃</button></div>
  </header>
  <div class="tabsBar">
    <button class="tBtn active" onclick="switchTab('issues',this)">📋 현안/이슈</button>
    <button class="tBtn" onclick="switchTab('reports',this)">📊 주간보고</button>
    <button class="tBtn" onclick="switchTab('calendar',this)">📅 일정/회의</button>
  </div>
  <main>
    <div class="tPanel active" id="panel-issues">
      <div id="instrDisplay"></div>
      <div id="adminInstrPnl" style="display:none;margin-bottom:12px;">
        <div id="instrEditBox" style="display:none;background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:8px;border:2px solid var(--accent);">
          <div class="adminLbl">⭐ 국장 지시사항 편집</div>
          <textarea id="instrInput" style="width:100%;padding:10px;border:1.5px solid var(--bdr);border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:14px;resize:vertical;min-height:80px" placeholder="지시사항을 입력하세요..."></textarea>
          <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
            <button class="btn btnG" onclick="cancelInstr()">취소</button>
            <button class="btn btnP" onclick="saveInstr()">저장</button>
          </div>
        </div>
        <div id="instrAdminBtns" style="display:flex;gap:6px;margin-bottom:4px;">
          <button class="btn btnP sm" onclick="newInstr()">+ 신규</button>
          <button class="btn btnG sm" id="instrEditBtn" onclick="editInstr()" style="display:none">✏️ 수정</button>
          <button class="btn btnD sm" id="instrDelBtn" onclick="deleteInstr()" style="display:none">삭제</button>
        </div>
      </div>
      <div class="statRow">
        <div class="statCard all"><div class="statNum" id="statAll">0</div><div class="statLabel">전체 이슈</div></div>
        <div class="statCard proc"><div class="statNum" id="statProc">0</div><div class="statLabel">진행중</div></div>

function checkNewWeekArchive(){
  if(!db||!reports.length)return;
  var now=new Date();
  var curWkKey=getWkKey(now);
  // 현재 주와 다른 주의 보고를 그룹화
  var byWeek={};
  reports.forEach(function(r){
    var d=r.date?new Date(r.date):now;
    var wk=getWkKey(d);
    if(wk!==curWkKey){
      if(!byWeek[wk])byWeek[wk]={key:wk,lbl:getWkLbl(d),items:[]};
      byWeek[wk].items.push(r);
    }
  });
  var oldWeeks=Object.keys(byWeek);
  if(!oldWeeks.length)return;
  // 이전 주 보고를 아카이브로 이동
  var promises=oldWeeks.map(function(wk){
    var grp=byWeek[wk];
    return db.ref('reports_archive/'+wk).once('value').then(function(s){
      var archData=s.val()||{weekLabel:grp.lbl,archivedAt:now.toISOString(),items:{}};
      grp.items.forEach(function(r){archData.items[r.id]=r;});
      archData.weekLabel=grp.lbl;
      return db.ref('reports_archive/'+wk).set(archData).then(function(){
        return grp.items.map(function(r){return r.id;});
      });
    });
  });
  Promise.all(promises).then(function(results){
    var idsToRemove=[].concat.apply([],results);
    return Promise.all(idsToRemove.map(function(id){return db.ref('reports/'+id).remove();}));
  });
}

      var ds=calY+'-'+pad(calM+1)+'-'+pad(dd);
      var gcEs=GCD.filter(function(e){return e.d===ds;});
      var dbEs=events.filter(function(e){return e.date===ds;});
      var hI=instruction&&instruction.date&&instruction.date.slice(0,10)===ds;
      var evH=gcEs.map(function(e){return '<div class="calEv gc" title="'+esc(e.t)+'">📅'+esc(e.t)+'</div>';}).join('')+dbEs.map(function(e){return '<div class="calEv '+(e.type||'mt')+'" title="'+esc(e.title)+'">'+esc(e.title)+'</div>';}).join('')+(hI?'<div class="calEv instr">📢지시</div>':'');
      html+='<div class="calCell'+(isTd?' today':'')+'" onclick="selDay(\''+ds+'\')"><div class="calDate">'+dd+'</div>'+evH+'</div>';
    }
    var rem=(7-(fd+ld)%7)%7;
    for(var d2=1;d2<=rem;d2++)html+='<div class="calCell om"><div class="calDate">'+d2+'</div></div>';
  }
  grid.innerHTML=html;
}
function selDay(ds){var panel=document.getElementById('dayEvts');var gcEs=GCD.filter(function(e){return e.d===ds;});var dbEs=events.filter(function(e){return e.date===ds;});var hI=instruction&&instruction.date&&instruction.date.slice(0,10)===ds;if(!gcEs.length&&!dbEs.length&&!hI){panel.innerHTML='<div class="gcLoad">이 날 일정이 없습니다.</div>';}else{panel.innerHTML='<b style="font-size:13px;color:var(--primary)">'+ds+'</b><br><br>'+gcEs.map(function(e){return '<div class="gcItem"><div class="gcItemT">📅 '+esc(e.t)+'</div><div class="gcItemTime">'+esc(e.tm||'종일')+'</div></div>';}).join('')+dbEs.map(function(e){return '<div class="gcItem"><div class="gcItemT">'+esc(e.title)+'</div>'+(currentUser&&currentUser.type==='admin'?'<button class="btn btnD sm" onclick="deleteEvent(\''+e.id+'\')">삭제</button>':'')+'</div>';}).join('')+(hI?'<div class="gcItem"><div class="gcItemT">📢 국장 지시사항</div></div>':'');}if(currentUser&&currentUser.type==='admin')document.getElementById('evDate').value=ds;}
function renderGcalSide(){var el=document.getElementById('gcalList');if(!el)return;var now=new Date();var up=GCD.filter(function(e){return new Date(e.d)>=now;}).sort(function(a,b){return new Date(a.d)-new Date(b.d);}).slice(0,12);if(!up.length){el.innerHTML='<div class="gcLoad">예정된 일정이 없습니다.</div>';return;}el.innerHTML=up.map(function(e){return '<div class="gcItem"><div class="gcItemT">📅 '+esc(e.t)+'</div><div class="gcItemTime">'+e.d+' '+esc(e.tm||'종일')+'</div></div>';}).join('');}

function fetchGCal(){
  var listEl=document.getElementById('gcalList');
  if(!GCAL_API_KEY||!GCAL_CAL_ID){setGCalSt('캘린더 ID 없음');return;}
  if(listEl)listEl.innerHTML='<div class="gcLoad">⏳ 캘린더 로딩 중...</div>';
  var now=new Date(),tMin=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString(),tMax=new Date(now.getFullYear(),now.getMonth()+3,1).toISOString();
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(GCAL_CAL_ID)+'/events?key='+GCAL_API_KEY+'&timeMin='+encodeURIComponent(tMin)+'&timeMax='+encodeURIComponent(tMax)+'&singleEvents=true&orderBy=startTime&maxResults=500';
  console.log('[GCal] fetching:', GCAL_CAL_ID);
  fetch(url).then(function(r){
    return r.json().then(function(data){return{ok:r.ok,status:r.status,data:data};});
  }).then(function(res){
    console.log('[GCal] response status:',res.status, res.data);
    if(!res.ok){
      var msg='오류 '+res.status+': '+(res.data.error&&res.data.error.message||'알 수 없는 오류');
      setGCalSt('❌ '+msg);
      if(listEl)listEl.innerHTML='<div class="gcLoad" style="color:red;">'+msg+'</div>';
      return;
    }
    GCD=(res.data.items||[]).map(function(e){var d=(e.start.dateTime||e.start.date||'').slice(0,10),tm='';if(e.start.dateTime){var s=new Date(e.start.dateTime),en=new Date(e.end.dateTime);tm=pad(s.getHours())+':'+pad(s.getMinutes())+'~'+pad(en.getHours())+':'+pad(en.getMinutes());}return{t:e.summary||'(제목없음)',d:d,tm:tm};});
    setGCalSt('✅ '+GCD.length+'개 일정 로드됨');
    console.log('[GCal] loaded',GCD.length,'events');
    renderCal();renderGcalSide();
  }).catch(function(e){
    console.error('[GCal] fetch error:',e);
    setGCalSt('❌ 네트워크 오류: '+e.message);
    if(listEl)listEl.innerHTML='<div class="gcLoad" style="color:red;">네트워크 오류</div>';
  });
}
function setGCalSt(msg){var el=document.getElementById('gcalStatus');if(el)el.textContent=msg;}
function saveGCalConfig(){var k=document.getElementById('gcalApiKey').value.trim(),id=document.getElementById('gcalCalId').value.trim();if(!k||!id){alert('API 키와 캘린더 ID를 모두 입력하세요.');return;}GCAL_API_KEY=k;GCAL_CAL_ID=id;localStorage.setItem('gcal_key',k);localStorage.setItem('gcal_calid',id);fetchGCal();}
function clearAllEvents(){showConf('등록된 일정을 모두 삭제하시겠습니까?',function(){if(db)db.ref('events').remove();events=[];renderCal();saveLS();});}
function showConf(msg,cb){document.getElementById('confMsg').textContent=msg;confCb=cb;document.getElementById('confDlg').style.display='flex';}
function closeConf(){document.getElementById('confDlg').style.display='none';confCb=null;}
function execConf(){if(confCb)confCb();closeConf();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtD(d){if(!(d instanceof Date)||isNaN(d))return '';return d.getFullYear()+'.'+(d.getMonth()+1+'').padStart(2,'0')+'.'+(''+d.getDate()).padStart(2,'0');}
function pad(n){return (''+n).padStart(2,'0');}
function saveEvent(){var t=document.getElementById('evTitle').value.trim();var d=document.getElementById('evDate').value;var ty=document.getElementById('evType').value;if(!t||!d){alert('제목과 날짜를 입력하세요.');return;}var data={title:t,date:d,type:ty};if(db){dbPush('events',data);}else{data.id=Date.now().toString();events.push(data);renderCal();saveLS();}document.getElementById('evTitle').value='';}
function deleteEvent(id){showConf('이 일정을 삭제하시겠습니까?',function(){dbRemove('events/'+id);if(!db){events=events.filter(function(e){return e.id!==id;});renderCal();saveLS();}});}
</script>
